name: Collect Data

on:
  schedule:
    - cron: '0 * * * *'   # every hour at minute 0 (UTC)
  workflow_dispatch:        # allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run collectors
        run: node dist/collectors/collect-cli.js
        env:
          ESTAT_API_KEY: ${{ secrets.ESTAT_API_KEY }}
          HEALTHCHECK_BASE_URL: ${{ secrets.HEALTHCHECK_BASE_URL }}
          HEALTHCHECK_UUID_MAP: ${{ secrets.HEALTHCHECK_UUID_MAP }}

      - name: Upload collected items
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: collected-items-${{ github.run_id }}
          path: data/collected_items.jsonl
          if-no-files-found: ignore
          retention-days: 7
